<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳医院地图</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="../assets/css/map.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="../index.html">← 返回全域总地图</a>
    </div>
</nav>
<div class="container py-3">
    <h4 class="text-center mb-3">全市医院、社区卫生中心点位</h4>
    <div id="map"></div>
    <div class="card p-4 mt-4">
        <h5>急救联系电话</h5>
        <ul>
            <li>濮阳市人民医院急救：0393-6120120</li>
            <li>濮阳市中医院急诊：0393-4412120</li>
            <li>华龙区人民医院：0393-8100120</li>
            <li>统一急救电话：120</li>
        </ul>
    </div>
</div>
<footer class="bg-dark text-white text-center mt-4">
    <small>濮阳便民地图 · 医疗点位专题</small>
</footer>
<script>
const map = L.map('map').setView([35.7762, 115.0186], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const hospIcon = L.divIcon({html:'🏥', className:'fs-3 text-danger', iconSize:[30,30]});
const hospList = [
    {name:"濮阳市人民医院",lat:35.773,lng:115.001},
    {name:"濮阳市中医院",lat:35.781,lng:115.012},
    {name:"华龙区人民医院",lat:35.766,lng:114.988},
    {name:"濮阳县人民医院",lat:35.702,lng:114.961},
    {name:"清丰县人民医院",lat:35.901,lng:115.105}
];
hospList.forEach(item=>{
    L.marker([item.lat,item.lng],{icon:hospIcon}).addTo(map).bindPopup(`<b>${item.name}</b>`);
})
</script>
</body>
</html>
