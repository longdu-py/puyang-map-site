<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳小区分布地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/map.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="../index.html">← 返回全域总地图</a>
    </div>
</nav>
<div class="container py-3">
    <h4 class="text-center mb-3">华龙区住宅小区地图</h4>
    <div class="card p-3 mb-3">
        <div class="input-group">
            <input id="comSearch" class="form-control" placeholder="输入小区名：龙城新居">
            <button id="comBtn" class="btn btn-primary">一键定位</button>
        </div>
    </div>
    <div id="map">地图加载中...</div>
</div>
<footer class="bg-dark text-white text-center mt-4">
    <small>濮阳便民地图 · 住宅小区专题</small>
</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([35.7762, 115.0186], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const houseIcon = L.divIcon({html:'🏠', className:'fs-3', iconSize:[30,30]});
const comList = [
    {name:"龙城新居",lat:35.7650,lng:114.9830},
    {name:"龙湖壹号",lat:35.7900,lng:115.0340},
    {name:"建业森林半岛",lat:35.7820,lng:115.0180},
    {name:"碧桂园翡翠郡",lat:35.7960,lng:115.0420},
    {name:"中央公园",lat:35.7740,lng:115.0040}
];
let comMarkers = [];
comList.forEach(item=>{
    const m = L.marker([item.lat,item.lng],{icon:houseIcon}).addTo(map).bindPopup(`<b>${item.name}</b>`);
    comMarkers.push({name:item.name, marker:m});
});
document.getElementById("comBtn").addEventListener("click",()=>{
    const val = document.getElementById("comSearch").value.trim();
    let target = null;
    comMarkers.forEach(i=>{
        if(i.name.includes(val)) target = i.marker;
    })
    if(target){
        map.setView(target.getLatLng(),15);
        target.openPopup();
    }else{
        alert("未找到该小区");
    }
})
</script>
</body>
</html>
