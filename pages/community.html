<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳小区分布地图</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="../assets/css/map.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🗺️ 返回濮阳总地图</a>
    </div>
</nav>

<div class="container py-3">
    <h4 class="text-center mb-3">华龙区热门住宅小区地图</h4>
    <div class="card mb-3 p-3">
        <div class="input-group">
            <input id="communitySearch" class="form-control" placeholder="输入小区名：龙城新居、龙湖壹号等">
            <button id="searchBtn" class="btn btn-primary">定位小区</button>
        </div>
    </div>
    <div id="map"></div>
</div>

<footer class="bg-dark text-white py-2 text-center mt-4">
    <small>濮阳便民地图 - 住宅小区专题</small>
</footer>

<script>
const map = L.map('map').setView([35.7762, 115.0186], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const houseIcon = L.divIcon({
    html: '🏠',
    className: 'fs-3',
    iconSize: [30, 30]
});

// 濮阳华龙区小区数据（包含龙城新居）
const communityList = [
    {name: "龙城新居", lat: 35.7650, lng: 114.9830},
    {name: "龙湖壹号", lat: 35.7900, lng: 115.0340},
    {name: "建业森林半岛", lat: 35.7820, lng: 115.0180},
    {name: "碧桂园翡翠郡", lat: 35.7960, lng: 115.0420},
    {name: "中央公园", lat: 35.7740, lng: 115.0040},
    {name: "濮上人家", lat: 35.7580, lng: 114.9760},
    {name: "恒大悦龙台", lat: 35.8010, lng: 115.0510}
];

// 缓存所有标记
const markerArr = [];
communityList.forEach(item => {
    const marker = L.marker([item.lat, item.lng], {icon: houseIcon})
        .addTo(map)
        .bindPopup(`<strong>${item.name}</strong>`);
    markerArr.push({name: item.name, marker});
});

// 小区检索功能
document.getElementById('searchBtn').addEventListener('click', () => {
    const key = document.getElementById('communitySearch').value.trim();
    if (!key) return alert("请输入小区名称");
    const target = markerArr.find(v => v.name.includes(key));
    if (target) {
        map.setView(target.marker.getLatLng(), 15);
        target.marker.openPopup();
    } else {
        alert("未查询到该小区");
    }
});
</script>
</body>
</html>
