<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳公交站点地图</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="../assets/css/map.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="../index.html">← 返回全域总地图</a>
    </div>
</nav>
<div class="container py-3">
    <h4 class="text-center mb-3">主城区公交站点分布</h4>
    <div id="map"></div>
    <div class="card p-4 mt-4">
        <h5>热门公交线路</h5>
        <ul>
            <li>1路：火车站 ↔ 龙湖广场</li>
            <li>6路：戚城公园 ↔ 水秀大剧院</li>
            <li>16路：濮阳县 ↔ 高铁站</li>
            <li>23路：华龙区政府 ↔ 车管所</li>
        </ul>
    </div>
</div>
<footer class="bg-dark text-white text-center mt-4">
    <small>濮阳便民地图 · 公交出行专题</small>
</footer>
<script>
const map = L.map('map').setView([35.7762, 115.0186], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const busIcon = L.divIcon({html:'🚌', className:'fs-3 text-success', iconSize:[30,30]});
const busList = [
    {name:"龙湖广场公交站",lat:35.789,lng:115.031},
    {name:"戚城公园站",lat:35.778,lng:115.006},
    {name:"水秀大剧院站",lat:35.793,lng:115.037},
    {name:"市人民医院站",lat:35.772,lng:114.999},
    {name:"濮阳高铁站",lat:35.821,lng:115.103}
];
busList.forEach(item=>{
    L.marker([item.lat,item.lng],{icon:busIcon}).addTo(map).bindPopup(`<b>${item.name}</b>`);
})
</script>
</body>
</html>
